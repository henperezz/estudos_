<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Imagem flexível</title>
    <link
      rel="shortcut icon"
      href="assets/tottenham_hotspur_17957.ico"
      type="image/x-icon"
    />
  </head>
  <body>
    <h1>Imagem Flexível</h1>
    <p>
      Você está vendo a imagem completa? Experimente ampliar o tamanho da janela
      para aproveitar melhor a experiência &#129327;
    </p>

    <picture>
      <source
        media="(max-width: 720px )"
        srcset="assets/paisagem-p.png"
        type="image/png"
      />
      <source
        media="(max-width: 1080px )"
        srcset="assets/paisagem-m.png"
        type="image/png"
      />
      <img src="assets/paisagem-g.png" alt="Mulher-encima-da-montanha" />
    </picture>
  </body>
</html>
