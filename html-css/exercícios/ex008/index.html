<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hyperlinks</title>
  </head>
  <body>
    <h1>Faremos uso de hyperlinks para exemplificação:</h1>

    <!--Um exemplo de link que leva ao meu github, um site externo que abrirá em nova aba que não está relacionado diretamente com o site-->
    <a href="https://github.com/henperezz" target="_blank" rel="external"
      >Meu Github</a
    >

    <br />

    <!--Este link é um exemplo que leva o usuário a uma área interna do site-->
    <a href="damn.html" target="_self" rel="next">DAMN</a>

    <br />

    <!--Também podemos criar links de download como este-->
    <a
      href="assets/1486318.pdf"
      download="pdf-física.pdf"
      type="application/pdf"
      >Baixe esse PDF de física bem mal feito</a
    >

    <!--Existe um tipo de rel que é o "nofollow" que condiz com links externos para sites que o desenvolvedor não aprova o conteúdo -->
  </body>
</html>
